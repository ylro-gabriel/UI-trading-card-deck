<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Card Deck</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Pokemon Trading Cards</h1>

    <!-- Deck for gen 1 -->
    <div class="deck deck1">
        <!-- Cards -->
         <div class="card grass">
            <div class="card-top">
                <div class="poke-stage">Stage 1</div>
                <div class="poke-name">Bulbasaur</div>
                <div class="type-container">
                    <div class="poke-type grass">Grass</div><div class="poke-type poison">Poison</div>
                </div>
            </div>
            <img src="images/gen 1/Bulbasaur.png" alt="An image of bulbasor" class="poke-image">
            <div class="description">
                For some time after its birth, it uses the nutrients that are packed into the seed on its back in order to grow.
            </div>
         </div>
    </div>
</body>
</html>
